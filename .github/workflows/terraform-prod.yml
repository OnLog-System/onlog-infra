name: Terraform Prod

on:
  pull_request:
    branches: [ prod ]
  push:
    branches: [ prod ]

permissions:
  contents: write
  pull-requests: write

env:
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_PROD_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_PROD_SECRET_ACCESS_KEY }}
  TF_VAR_admin_bastion_public_key_yoonseok: ${{ secrets.ADMIN_BASTION_PUBLIC_KEY_YOONSEOK }}
  TF_VAR_tailscale_auth_key: ${{ secrets.TAILSCALE_AUTH_KEY_ADMIN_BASTION }}
  AWS_REGION: ap-northeast-2

jobs:
  terraform:
    runs-on: ubuntu-latest

    steps:
      # 1. 코드 체크아웃
      - name: Checkout
        uses: actions/checkout@v3

      # 2. Terraform 설치
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.14.0

      # 3. Terraform Init (backend 연결)
      - name: Terraform Init
        working-directory: ./env/prod
        run: terraform init -input=false

      # 4. 코드 포맷 검사
      - name: Terraform Format
        working-directory: ./env/prod
        run: terraform fmt -check

      # 5. 문법 유효성 검사
      - name: Terraform Validate
        working-directory: ./env/prod
        run: terraform validate

      # 6. PR일 때만 plan 수행
      - name: Terraform Plan (PR only)
        if: github.event_name == 'pull_request'
        id: plan
        working-directory: ./env/prod
        run: terraform plan -input=false -no-color | tee plan.txt

      # 7. plan 결과를 GITHUB_OUTPUT로 전달
      - name: Capture Plan Output
        if: github.event_name == 'pull_request'
        id: plan_output
        working-directory: ./env/prod
        run: |
          echo "stdout<<EOF" >> $GITHUB_OUTPUT
          cat plan.txt >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      # 8. PR에 plan 결과 댓글 붙이기
      - name: Comment Plan on PR
        uses: marocchino/sticky-pull-request-comment@v2
        if: github.event_name == 'pull_request'
        with:
          header: terraform plan
          message: ${{ steps.plan_output.outputs.stdout }}

      # 9. prod에 push되었을 때 apply 실행
      - name: Terraform Apply (prod push only)
        if: github.ref == 'refs/heads/prod' && github.event_name == 'push'
        working-directory: ./env/prod
        run: terraform apply -auto-approve