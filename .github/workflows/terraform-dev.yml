name: Terraform Dev

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

env:
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_DEV_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_DEV_SECRET_ACCESS_KEY }}
  AWS_REGION: ap-northeast-2

jobs:
  terraform:
    runs-on: ubuntu-latest

    steps:
      # 1. 코드 체크아웃
      - name: Checkout
        uses: actions/checkout@v3

      # 2. Terraform 설치
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.14.0

      # 3. Terraform Init (backend 연결)
      - name: Terraform Init
        working-directory: ./env/dev
        run: terraform init -input=false

      # 4. 코드 포맷 검사
      - name: Terraform Format
        working-directory: ./env/dev
        run: terraform fmt -check

      # 5. 문법 유효성 검사
      - name: Terraform Validate
        working-directory: ./env/dev
        run: terraform validate

      # 6. PR일 때만 plan 수행
      - name: Terraform Plan (PR only)
        if: github.event_name == 'pull_request'
        working-directory: ./env/dev
        run: terraform plan -input=false

      # 7. PR에 plan 결과 댓글 붙이기
      - name: Comment Plan on PR
        uses: marocchino/sticky-pull-request-comment@v2
        if: github.event_name == 'pull_request'
        with:
          header: terraform plan
          message: "```\n${{ steps.plan.outputs.stdout }}\n```"

      # 8. main에 push되었을 때 apply 실행
      - name: Terraform Apply (main push only)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        working-directory: ./env/dev
        run: terraform apply -auto-approve
